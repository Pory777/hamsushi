name: 自动搜索滨寿司最低价
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  search-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 安装 Playwright + Firefox
        run: |
          pip3 install playwright
          python3 -m playwright install firefox
      
      - name: 搜索滨寿司优惠
        run: python3 auto_finder/auto_finder.py
      
      - name: 提交并推送数据更新
        run: |
          git config user.name "Auto Finder"
          git config user.email "bot@hamsushi.app"
          git add data/deals.json
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新优惠数据 $(date +'%Y-%m-%d')"
          git push
